<!doctype html><html lang="en-us"><head><meta charset="utf-8"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><title>anhungxadieu</title><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script><script src="https://www.geogebra.org/apps/deployggb.js"></script><script defer="defer" src="bundle.09377cc8c5f413752dd5.js"></script><link href="main.css" rel="stylesheet"></head><body><div id="app-container"><div id="drawing-panel"><canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="1"></canvas></div></div><div id="html-dialogue-box"><h3 id="dialogue-speaker">Speaker Name</h3><div id="dialogue-text">Dialogue text goes here...</div><div id="dialogue-choices"></div></div><div id="quest-progress-container" class="rpg-panel"><div class="quest-header"><span>🏆 Thử thách:</span> <span id="quest-count">0/5</span></div><div class="quest-track"><div id="quest-progress-fill"></div></div></div><div id="inventory-container" class="rpg-panel"><div class="inventory-title">🎒 Hành trang:</div><div id="inventory-slots"></div></div><div id="ggb-element" style="display:none"></div><div id="controls"><label>Scale Factor: <input type="number" id="scaleInput" value="0.25" step="0.05" min="0.05" style="width:60px"></label> <label>Nhân vật:</label> <select id="vrmSelect"></select> <label>Động tác:</label> <select id="animSelect"></select> <button id="btnExport">Lưu file PNG</button><p id="status">Kéo thả file FBX Animation vào đây để cập nhật!</p><canvas id="renderCanvas"></canvas></div><script id="vertex_shader" type="x-shader/x-vertex">#version 300 es
        in vec3 a_position;	//Standard position data.
        in vec2 a_uv;

        uniform mat4 uPMatrix;
        uniform mat4 uMVMatrix;
        uniform mat4 uCameraMatrix;

        out vec2 uv;

        void main(void){
            uv = a_uv;
            gl_Position = uPMatrix * uCameraMatrix * uMVMatrix * vec4(a_position, 1.0); 
        }</script><script id="fragment_shader" type="x-shader/x-fragment">#version 300 es
        precision mediump float;
        in vec2 uv;

        out vec4 finalColor;
        void main(void){
            finalColor = vec4(1,0,0,1);
        }</script></body></html>
